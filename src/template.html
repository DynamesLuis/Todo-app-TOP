<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo-app</title>
</head>

<body>
    <nav>
        <header>
            <h1>Todo-app</h1>
        </header>
        <section>
            <div>
                <p>Menu</p>
                <ul class="special-options">
                    <li class="date-item today">Today</li>
                    <li class="date-item seven">Last 7 days</li>
                </ul>
            </div>
            <div class="projects-section">
                <p>Projects</p>
                <ul class="projects-container">

                </ul>
            </div>
            <button class="add-btn project">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-plus">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M12 5l0 14" />
                    <path d="M5 12l14 0" />
                </svg>
                Project
            </button>
        </section>
    </nav>
    <main>
        <header class="tasks-header">

            <!-- Search -->
            <div class="search-container">

                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="search-icon">

                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M10 10m-7 0a7 7 0 1 0 14 0a7 7 0 1 0 -14 0" />
                    <path d="M21 21l-6 -6" />

                </svg>

                <input type="text" placeholder="Search tasks..." class="search-input">

            </div>

            <!-- Add Task Button -->
            <button class="addTask-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-plus">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M12 5l0 14" />
                    <path d="M5 12l14 0" />
                </svg>
                Todo
            </button>

        </header>
        <div class="tasks-table-container">
            <p class="empty-tasks-message">No tasks yet. Create one!</p>
            <table class="tasks-table hidden">

                <thead>
                    <tr>
                        <th>Done</th>
                        <th>Name</th>
                        <th>Description</th>
                        <th>Due Date</th>
                        <th>Priority</th>
                        <th>Actions</th>
                    </tr>
                </thead>

                <tbody class="todo-container">

                </tbody>

            </table>

        </div>
    </main>
    <div class="addProject-modal hidden">
        <button class="closeProject-modal-Btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-x">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M18 6l-12 12" />
                <path d="M6 6l12 12" />
            </svg>
        </button>
        <form action="">
            <div>
                <label for="name">Name:</label>
                <input type="text" name="" id="name">
            </div>
            <button class="submit-btn">Save</button>
        </form>
    </div>
    <div class="addTodo-modal hidden">

        <button class="closeTask-modal-Btn">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M18 6l-12 12" />
                <path d="M6 6l12 12" />
            </svg>
        </button>

        <form class="task-form">

            <!-- Name -->
            <div class="form-group">
                <label for="task-name">Name</label>
                <input type="text" id="task-name" placeholder="Enter task name" name="name">
            </div>

            <!-- Description -->
            <div class="form-group">
                <label for="task-description">Description</label>
                <textarea id="task-description" rows="4" placeholder="Enter task description" name="description"></textarea>
            </div>

            <!-- Due Date -->
            <div class="form-group">
                <label for="task-date">Due Date</label>
                <input type="date" id="task-date" name="dueDate">
            </div>

            <!-- Priority -->
            <div class="form-group">
                <label>Priority</label>

                <div class="priority-options">

                    <label class="priority low">
                        <input type="radio" name="priority" value="low">
                        <span>Low</span>
                    </label>

                    <label class="priority medium">
                        <input type="radio" name="priority" value="medium">
                        <span>Medium</span>
                    </label>

                    <label class="priority high">
                        <input type="radio" name="priority" value="high">
                        <span>High</span>
                    </label>

                </div>
            </div>

            <button type="submit" class="submit-todo-btn">
                Save Task
            </button>

        </form>

    </div>
</body>

</html>
